<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Diff Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            padding: 20px;
            min-height: 100vh;
        }

        /* ── Drop zone / Welcome ── */
        .drop-zone {
            border: 2px dashed #30363d;
            border-radius: 12px;
            padding: 60px 30px;
            text-align: center;
            transition: all 0.2s;
            cursor: pointer;
            margin-bottom: 24px;
        }

        .drop-zone.drag-over {
            border-color: #58a6ff;
            background: rgba(88, 166, 255, 0.06);
        }

        .drop-zone h2 {
            color: #58a6ff;
            font-size: 1.3em;
            margin-bottom: 10px;
        }

        .drop-zone p {
            color: #8b949e;
            font-size: 0.95em;
            margin-bottom: 16px;
        }

        .drop-zone .icon {
            font-size: 3em;
            margin-bottom: 12px;
        }

        .drop-zone button {
            padding: 10px 24px;
            background: #238636;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 0.95em;
            cursor: pointer;
            font-weight: 600;
        }

        .drop-zone button:hover {
            background: #2ea043;
        }

        .drop-zone .hint {
            color: #484f58;
            font-size: 0.8em;
            margin-top: 12px;
        }

        /* ── Summary ── */
        .summary {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 24px;
            display: none;
        }

        .summary.visible {
            display: block;
        }

        .summary h2 {
            color: #58a6ff;
            font-size: 1.1em;
            margin-bottom: 12px;
        }

        .summary ul {
            list-style: none;
            padding: 0;
        }

        .summary li {
            padding: 4px 0;
            font-size: 0.9em;
            color: #8b949e;
            cursor: pointer;
        }

        .summary li:hover {
            color: #58a6ff;
            text-decoration: underline;
        }

        .summary .stat {
            display: inline-block;
            margin-right: 16px;
            font-size: 0.95em;
        }

        .stat-add {
            color: #3fb950;
        }

        .stat-del {
            color: #f85149;
        }

        .stat-files {
            color: #d2a8ff;
        }

        /* ── File blocks ── */
        .file-block {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            margin-bottom: 16px;
            overflow: hidden;
        }

        .file-header {
            background: #1c2128;
            padding: 10px 16px;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 0.85em;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
        }

        .file-header:hover {
            background: #22272e;
        }

        .file-icon {
            color: #8b949e;
            font-size: 0.9em;
            transition: transform 0.2s;
        }

        .file-header.collapsed .file-icon {
            transform: rotate(-90deg);
        }

        .file-path {
            color: #58a6ff;
            word-break: break-all;
        }

        .file-badge {
            font-size: 0.75em;
            padding: 1px 6px;
            border-radius: 10px;
            font-weight: 600;
            margin-left: auto;
            white-space: nowrap;
        }

        .badge-modified {
            background: #9e6a03;
            color: #fff;
        }

        .hunk-header {
            background: #1c2128;
            color: #79c0ff;
            padding: 4px 16px;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 0.8em;
            border-top: 1px solid #30363d;
        }

        /* ── Diff table ── */
        .diff-table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 0.82em;
            table-layout: fixed;
        }

        .diff-table td {
            padding: 1px 10px;
            vertical-align: top;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .line-num {
            width: 50px;
            min-width: 50px;
            max-width: 50px;
            text-align: right;
            color: #484f58;
            user-select: none;
            padding-right: 10px;
            border-right: 1px solid #30363d;
        }

        .line-sign {
            width: 20px;
            min-width: 20px;
            max-width: 20px;
            text-align: center;
            user-select: none;
            font-weight: bold;
        }

        .line-content {
            width: auto;
        }

        .line-add {
            background: rgba(63, 185, 80, 0.15);
        }

        .line-add .line-sign {
            color: #3fb950;
        }

        .line-add .line-content {
            color: #aff5b4;
        }

        .line-del {
            background: rgba(248, 81, 73, 0.15);
        }

        .line-del .line-sign {
            color: #f85149;
        }

        .line-del .line-content {
            color: #ffa198;
        }

        .line-ctx {
            background: transparent;
        }

        .line-ctx .line-content {
            color: #8b949e;
        }

        /* ── Toolbar ── */
        .toolbar {
            display: none;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        .toolbar.visible {
            display: flex;
        }

        .toolbar input {
            flex: 1;
            min-width: 200px;
            padding: 8px 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            font-size: 0.9em;
            outline: none;
        }

        .toolbar input:focus {
            border-color: #58a6ff;
        }

        .toolbar button,
        .toolbar label {
            padding: 8px 14px;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            cursor: pointer;
            font-size: 0.85em;
            white-space: nowrap;
        }

        .toolbar button:hover,
        .toolbar label:hover {
            background: #30363d;
        }

        .toolbar button.active {
            background: #1f6feb;
            border-color: #1f6feb;
        }

        .toolbar .btn-new {
            background: #238636;
            border-color: #238636;
        }

        .toolbar .btn-new:hover {
            background: #2ea043;
        }

        .file-input-hidden {
            display: none;
        }

        .hidden {
            display: none !important;
        }

        .file-content.collapsed-content {
            display: none;
        }

        .filename-label {
            color: #8b949e;
            font-size: 0.85em;
            margin-bottom: 4px;
        }
    </style>
</head>

<body>

    <!-- Drop zone -->
    <div class="drop-zone" id="dropZone">
        <div class="icon">📂</div>
        <h2>Git Diff Viewer</h2>
        <p>Arraste e solte um arquivo <code>.txt</code> / <code>.diff</code> / <code>.patch</code> com saída do
            <code>git diff</code></p>
        <button id="btnBrowse">Selecionar arquivo</button>
        <input type="file" id="fileInput" class="file-input-hidden" accept=".txt,.diff,.patch">
        <div class="hint">Suporta qualquer saída de <code>git diff</code>, <code>git log -p</code>,
            <code>git format-patch</code></div>
    </div>

    <!-- Summary -->
    <div class="summary" id="summary"></div>

    <!-- Toolbar -->
    <div class="toolbar" id="toolbar">
        <input type="text" id="searchInput" placeholder="Filtrar por nome de arquivo...">
        <button id="btnExpandAll" title="Expandir todos">▼ Expandir</button>
        <button id="btnCollapseAll" title="Recolher todos">▶ Recolher</button>
        <button id="btnChangesOnly" title="Mostrar apenas linhas alteradas">Só alterações</button>
        <label class="btn-new" id="btnLoadAnother">
            📂 Carregar outro
            <input type="file" id="fileInput2" class="file-input-hidden" accept=".txt,.diff,.patch">
        </label>
    </div>

    <!-- Diff content -->
    <div id="diffContainer"></div>

    <script>
        // ── File loading ──
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileInput2 = document.getElementById('fileInput2');
        const summary = document.getElementById('summary');
        const toolbar = document.getElementById('toolbar');
        const container = document.getElementById('diffContainer');

        document.getElementById('btnBrowse').addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', e => handleFiles(e.target.files));
        fileInput2.addEventListener('change', e => { handleFiles(e.target.files); e.target.value = ''; });

        // Drag & drop
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            handleFiles(e.dataTransfer.files);
        });

        // Also allow drop anywhere on the page once loaded
        document.body.addEventListener('dragover', e => e.preventDefault());
        document.body.addEventListener('drop', e => {
            e.preventDefault();
            if (e.target.closest('.drop-zone')) return;
            handleFiles(e.dataTransfer.files);
        });

        function handleFiles(fileList) {
            if (!fileList || !fileList.length) return;
            const file = fileList[0];
            const reader = new FileReader();
            reader.onload = () => {
                loadDiff(reader.result, file.name);
            };
            reader.readAsText(file, 'UTF-8');
        }

        // ── Diff parsing ──
        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function parseDiff(raw) {
            const lines = raw.split('\n');
            const files = [];
            let current = null;
            let hunkLines = [];

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];

                if (line.startsWith('diff --git')) {
                    if (current) {
                        if (hunkLines.length) current.hunks.push(hunkLines);
                        files.push(current);
                    }
                    const match = line.match(/diff --git a\/(.+?) b\/(.+)/);
                    current = { path: match ? match[2] : line, hunks: [], additions: 0, deletions: 0 };
                    hunkLines = [];
                    continue;
                }
                if (!current) continue;
                if (line.startsWith('index ') || line.startsWith('---') || line.startsWith('+++') ||
                    line.startsWith('new file') || line.startsWith('deleted file') ||
                    line.startsWith('old mode') || line.startsWith('new mode') ||
                    line.startsWith('similarity') || line.startsWith('rename') ||
                    line.startsWith('copy ') || line.startsWith('dissimilarity')) continue;

                if (line.startsWith('@@')) {
                    if (hunkLines.length) current.hunks.push(hunkLines);
                    hunkLines = [{ type: 'hunk', text: line }];
                    continue;
                }
                if (line.startsWith('+')) {
                    current.additions++;
                    hunkLines.push({ type: 'add', text: line.substring(1) });
                } else if (line.startsWith('-')) {
                    current.deletions++;
                    hunkLines.push({ type: 'del', text: line.substring(1) });
                } else if (line.startsWith(' ') || line === '') {
                    hunkLines.push({ type: 'ctx', text: line.substring(1) || '' });
                } else if (line.startsWith('\\')) {
                    hunkLines.push({ type: 'ctx', text: line });
                }
            }
            if (current) {
                if (hunkLines.length) current.hunks.push(hunkLines);
                files.push(current);
            }
            return files;
        }

        // ── Find longest common prefix to shorten paths ──
        function findCommonPrefix(paths) {
            if (!paths.length) return '';
            let prefix = paths[0];
            for (let i = 1; i < paths.length; i++) {
                while (paths[i].indexOf(prefix) !== 0) {
                    prefix = prefix.substring(0, prefix.lastIndexOf('/'));
                    if (!prefix) return '';
                }
            }
            // Include trailing slash
            if (prefix && !prefix.endsWith('/')) {
                prefix = prefix.substring(0, prefix.lastIndexOf('/') + 1);
            }
            return prefix.length > 10 ? prefix : '';
        }

        // ── Rendering ──
        let commonPrefix = '';

        function shortPath(p) {
            if (commonPrefix && p.startsWith(commonPrefix)) {
                return '…/' + p.substring(commonPrefix.length);
            }
            return p;
        }

        function loadDiff(raw, filename) {
            const files = parseDiff(raw);
            if (!files.length) {
                alert('Nenhuma diferença encontrada no arquivo. Certifique-se de que é uma saída válida de git diff.');
                return;
            }

            // Auto-detect common prefix
            commonPrefix = findCommonPrefix(files.map(f => f.path));

            // Hide drop zone, show toolbar
            dropZone.style.display = 'none';
            summary.classList.add('visible');
            toolbar.classList.add('visible');

            // Reset state
            changesOnly = false;
            document.getElementById('btnChangesOnly').classList.remove('active');
            document.getElementById('searchInput').value = '';

            renderDiff(files, filename);
        }

        function renderDiff(files, filename) {
            let totalAdd = 0, totalDel = 0;
            files.forEach(f => { totalAdd += f.additions; totalDel += f.deletions; });

            summary.innerHTML = `
    <h2>📊 Resumo das Diferenças</h2>
    ${filename ? `<div class="filename-label">Arquivo: <strong>${escapeHtml(filename)}</strong></div>` : ''}
    <div style="margin: 8px 0">
      <span class="stat stat-files">📁 ${files.length} arquivo${files.length !== 1 ? 's' : ''} alterado${files.length !== 1 ? 's' : ''}</span>
      <span class="stat stat-add">+${totalAdd} adiç${totalAdd !== 1 ? 'ões' : 'ão'}</span>
      <span class="stat stat-del">−${totalDel} remoç${totalDel !== 1 ? 'ões' : 'ão'}</span>
    </div>
    <details>
      <summary style="cursor:pointer;color:#58a6ff;font-size:0.9em;margin-bottom:6px">Lista de arquivos</summary>
      <ul>${files.map((f, i) =>
                `<li onclick="scrollToFile(${i})">
          <span class="stat-add">+${f.additions}</span>
          <span class="stat-del">−${f.deletions}</span>
          ${escapeHtml(shortPath(f.path))}
        </li>`
            ).join('')}</ul>
    </details>
  `;

            container.innerHTML = '';
            files.forEach((file, idx) => {
                const block = document.createElement('div');
                block.className = 'file-block';
                block.dataset.path = file.path.toLowerCase();
                block.id = 'file-' + idx;

                const header = document.createElement('div');
                header.className = 'file-header';
                header.innerHTML = `
      <span class="file-icon">▼</span>
      <span class="file-path">${escapeHtml(shortPath(file.path))}</span>
      <span class="file-badge badge-modified">
        <span class="stat-add">+${file.additions}</span>&nbsp;
        <span class="stat-del">−${file.deletions}</span>
      </span>
    `;
                header.onclick = () => toggleFile(block);
                block.appendChild(header);

                const content = document.createElement('div');
                content.className = 'file-content';

                file.hunks.forEach(hunk => {
                    let lineOld = 0, lineNew = 0;
                    const hunkHeader = hunk[0];
                    if (hunkHeader && hunkHeader.type === 'hunk') {
                        const m = hunkHeader.text.match(/@@ -(\d+)/);
                        if (m) lineOld = parseInt(m[1]);
                        const m2 = hunkHeader.text.match(/@@ -\d+(?:,\d+)? \+(\d+)/);
                        if (m2) lineNew = parseInt(m2[1]);

                        const hd = document.createElement('div');
                        hd.className = 'hunk-header';
                        hd.textContent = hunkHeader.text;
                        content.appendChild(hd);
                    }

                    const table = document.createElement('table');
                    table.className = 'diff-table';
                    const tbody = document.createElement('tbody');

                    for (let j = 1; j < hunk.length; j++) {
                        const entry = hunk[j];
                        const tr = document.createElement('tr');
                        const tdNumOld = document.createElement('td');
                        const tdNumNew = document.createElement('td');
                        const tdSign = document.createElement('td');
                        const tdContent = document.createElement('td');

                        tdNumOld.className = 'line-num';
                        tdNumNew.className = 'line-num';
                        tdSign.className = 'line-sign';
                        tdContent.className = 'line-content';

                        if (entry.type === 'add') {
                            tr.className = 'line-add';
                            tdNumNew.textContent = lineNew++;
                            tdSign.textContent = '+';
                            tdContent.textContent = entry.text;
                        } else if (entry.type === 'del') {
                            tr.className = 'line-del';
                            tdNumOld.textContent = lineOld++;
                            tdSign.textContent = '−';
                            tdContent.textContent = entry.text;
                        } else {
                            tr.className = 'line-ctx';
                            tdNumOld.textContent = lineOld++;
                            tdNumNew.textContent = lineNew++;
                            tdSign.textContent = ' ';
                            tdContent.textContent = entry.text;
                        }

                        tr.appendChild(tdNumOld);
                        tr.appendChild(tdNumNew);
                        tr.appendChild(tdSign);
                        tr.appendChild(tdContent);
                        tbody.appendChild(tr);
                    }
                    table.appendChild(tbody);
                    content.appendChild(table);
                });

                block.appendChild(content);
                container.appendChild(block);
            });
        }

        // ── Interactions ──
        function toggleFile(block) {
            block.querySelector('.file-header').classList.toggle('collapsed');
            block.querySelector('.file-content').classList.toggle('collapsed-content');
        }

        function scrollToFile(idx) {
            const el = document.getElementById('file-' + idx);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        document.getElementById('searchInput').addEventListener('input', function () {
            const q = this.value.toLowerCase();
            document.querySelectorAll('.file-block').forEach(b => {
                b.classList.toggle('hidden', q && !b.dataset.path.includes(q));
            });
        });

        document.getElementById('btnExpandAll').addEventListener('click', () => {
            document.querySelectorAll('.file-block').forEach(b => {
                b.querySelector('.file-header').classList.remove('collapsed');
                b.querySelector('.file-content').classList.remove('collapsed-content');
            });
        });

        document.getElementById('btnCollapseAll').addEventListener('click', () => {
            document.querySelectorAll('.file-block').forEach(b => {
                b.querySelector('.file-header').classList.add('collapsed');
                b.querySelector('.file-content').classList.add('collapsed-content');
            });
        });

        let changesOnly = false;
        document.getElementById('btnChangesOnly').addEventListener('click', function () {
            changesOnly = !changesOnly;
            this.classList.toggle('active', changesOnly);
            document.querySelectorAll('.line-ctx').forEach(tr => tr.classList.toggle('hidden', changesOnly));
        });
    </script>
</body>

</html>
