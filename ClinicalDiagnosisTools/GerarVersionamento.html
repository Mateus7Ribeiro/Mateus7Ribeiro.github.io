<!DOCTYPE html>
<html>

<head>
    <title>Formulário OS e Branches</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h2>Formulário OS e Branches</h2>

        <div id="profileSection" style="margin-bottom: 15px; padding: 10px; border: 1px solid #ddd; border-radius: 4px; background: #f9f9f9;">
            <label><b>Perfis salvos:</b></label>
            <div style="display: flex; gap: 8px; margin-top: 5px; align-items: center;">
                <select id="profileSelect" style="flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
                    <option value="">-- Selecione um perfil --</option>
                </select>
                <button class="metal-button" type="button" onclick="loadProfile()">Carregar</button>
                <button class="metal-button" type="button" onclick="deleteProfile()" style="background: #c0392b; color: white;">Apagar</button>
            </div>
            <div style="display: flex; gap: 8px; margin-top: 8px; align-items: center;">
                <input type="text" id="profileName" placeholder="Nome do perfil" style="flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
                <button class="metal-button" type="button" onclick="saveProfile()">Salvar Perfil</button>
            </div>
        </div>

        <form id="osForm" action="" method="get">
            <label for="osNumber">Número da OS:</label>
            <input type="text" id="osNumber" name="osNumber"><br><br>

            <label for="branches">Branches (separadas por vírgula):</label>
            <input type="text" id="branches" name="branches" value="art_diagnosis,5.02.1839,5.02.1838,5.01.1835"
                required>
            <input type="text" size="5" id="sufixo" name="sufixo" value="-B mr_{os}_{version}"
                placeholder="Ex: -B mr_{os}_{version}  ou  -b {os}/{version}"><br><br>

            <label for="cherry">Cherry-pick (separados por vírgula):</label>
            <input type="text" id="cherry" name="cherry" value="">

            <input type="text" id="repository" name="repository" list="repositoryList"
                placeholder="Selecione ou cole um repositório">
            <datalist id="repositoryList"></datalist>
            <br><br>

            <input type="checkbox" id="removeInitialCheckout" name="removeInitialCheckout" value="">
            <label for="removeInitialCheckout">Remover checkout Inicial (initial checkout)</label><br>

            <input type="checkbox" id="removePull" name="removePull" checked>
            <label for="removePull">Remover comando Pull</label><br>

            <input type="checkbox" id="removeBranchCheckout" name="removeBranchCheckout" value="">
            <label for="removeBranchCheckout">Remover checkout Branch</label><br>

            <input type="checkbox" id="removePush" name="removePush">
            <label for="removePush">Remover comando Push</label><br><br>

            <!--
            <input type="checkbox" id="quebraBranchVersao" name="quebraBranchVersao">
            <label for="quebraBranchVersao">Considerar última parte da branch como a versão</label><br>
			<br>
            -->


            <input class="metal-button" type="submit" value="Gerar Comandos">
        </form>
        <br>
        <div id="resultados"></div>
        <div class="code"><b>Comando para mostrar hash localmente</b>
git log -1 --pretty=format:"%H"</div>
        <hr>
        <button class="metal-button" type="button" onclick="createLinksPR()">Compare Branchs</button>
        <button class="metal-button" type="button" onclick="createLinksEdit()">Editor GitHub</button>
        <br><br>
        <div id="links-github-edit"></div><br>
        <a href="https://share.philips.com/sites/ArchitectureInnovation/SitePages/Git---Commit-Patterns.aspx">Commit-Pattern
            Reference Doc</a>
             | <a target=""
              href="GerarVersionamento.html?osNumber=999999&branches=art_pas_exams,5.06.1848,5.04.1845,5.03.1842,5.02.1839,5.02.1838,5.01.1835,dev,1.10.x,1.8.x,1.9.x&cherry=2824b48cb7e972416e6721d6abcfab978900409c">
              Preconfig</a>
    </div>
    
   
    <script src="versionamento.js"></script>
</body>

</html>
